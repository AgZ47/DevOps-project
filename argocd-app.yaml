apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-microservice-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/AgZ47/Valoriz-Assignment"
    targetRevision: HEAD
    path: gitops-manifests
  destination:
    server: "https://kubernetes.default.svc"
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Automatically creates the 'app' namespace
